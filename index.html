<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Will You Marry Me? 💍</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    overflow: hidden;
    background: url("./bg.jpg") no-repeat center center fixed;
    background-size: cover;
}

body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.55);
}

/* Layout */
.container {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Name glow */
.name {
    font-size: 2rem;
    color: #fff;
    margin-bottom: 10px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #ff4d6d; }
    to { text-shadow: 0 0 25px #ff4d6d, 0 0 40px #ff99aa; }
}

h1 {
    color: white;
    font-size: 2.5rem;
}

/* Buttons row */
.buttons {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    position: relative;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    min-width: 120px;
}

#yesBtn {
    background: #4CAF50;
    color: white;
}

#noBtn {
    background: #ff4d4d;
    color: white;
    position: relative;
}

/* Popup */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    z-index: 10;
    transition: 0.4s;
}

.popup.active {
    transform: translate(-50%, -50%) scale(1);
}

/* Ring */
.ring-box {
    width: 120px;
    height: 80px;
    background: #222;
    margin: 20px auto;
    border-radius: 10px;
    position: relative;
    perspective: 1000px;
}

.lid {
    width: 100%;
    height: 50%;
    background: #111;
    position: absolute;
    top: 0;
    transform-origin: bottom;
    transition: 0.8s;
}

.ring-box.open .lid {
    transform: rotateX(-120deg);
}

.ring {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 30px;
    opacity: 0;
    transition: 0.5s;
}

.ring-box.open .ring {
    opacity: 1;
}

/* Confetti */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: -10px;
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

/* Fireworks */
.firework {
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(8); opacity: 0; }
}
</style>
</head>

<body>

<div class="container" id="mainContainer">
    <div class="name">❤️ KAJOL ❤️</div>
    <h1>Will you marry me? 💍</h1>

    <div class="buttons">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😢</button>
    </div>
</div>

<div class="popup" id="popup">
    <h2>💖 I LOVE YOOOOU BABYY🥹🥹! 💖</h2>

    <div class="ring-box" id="ringBox">
        <div class="lid"></div>
        <div class="ring">💍</div>
    </div>

    <p>Forever starts now ❤️🥰</p>
</div>

<audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const popup = document.getElementById("popup");
const container = document.getElementById("mainContainer");
const music = document.getElementById("bgMusic");
const ringBox = document.getElementById("ringBox");

// Move NO button
function moveButton() {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);
noBtn.addEventListener("touchstart", moveButton);

// YES click
yesBtn.addEventListener("click", () => {
    container.style.display = "none";
    popup.classList.add("active");

    setTimeout(() => ringBox.classList.add("open"), 500);

    // music fade-in
    music.volume = 0;
    music.play().catch(() => {});
    let vol = 0;
    let fade = setInterval(() => {
        if (vol < 0.7) {
            vol += 0.05;
            music.volume = vol;
        } else clearInterval(fade);
    }, 200);

    launchConfetti();
    launchFireworks();
});

// Confetti
function launchConfetti() {
    for (let i = 0; i < 120; i++) {
        let c = document.createElement("div");
        c.classList.add("confetti");
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = `hsl(${Math.random()*360},100%,50%)`;
        c.style.animationDuration = (Math.random()*3 + 2) + "s";
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
    }
}

// Fireworks
function launchFireworks() {
    setInterval(() => {
        for (let i = 0; i < 15; i++) {
            let f = document.createElement("div");
            f.classList.add("firework");
            f.style.left = Math.random() * window.innerWidth + "px";
            f.style.top = Math.random() * window.innerHeight + "px";
            f.style.background = `hsl(${Math.random()*360},100%,60%)`;
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 1000);
        }
    }, 800);
}
</script>

</body>
</html>
